<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Invoice PDF Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink: #1a1410;
    --paper: #faf8f4;
    --cream: #f2ede4;
    --gold: #c9952a;
    --gold-light: #e8c97a;
    --rust: #b04a2a;
    --muted: #7a7065;
    --border: #d8d0c4;
    --shadow: rgba(26,20,16,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── TOP BAR ── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px var(--shadow);
  }
  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 1.5rem;
    letter-spacing: 0.02em;
  }
  header h1 span { color: var(--gold-light); font-style: italic; }

  .header-actions { display: flex; gap: 12px; }

  btn-base, .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: all 0.18s ease;
  }
  .btn-gold {
    background: var(--gold);
    color: var(--ink);
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 22px; border-radius: 4px;
    font-family: 'DM Mono', monospace; font-size: 0.78rem; font-weight: 500;
    cursor: pointer; border: none; letter-spacing: 0.05em; text-transform: uppercase;
    transition: all 0.18s ease;
  }
  .btn-gold:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(201,149,42,0.35); }

  .btn-outline {
    background: transparent;
    color: var(--paper);
    border: 1px solid rgba(255,255,255,0.25);
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 22px; border-radius: 4px;
    font-family: 'DM Mono', monospace; font-size: 0.78rem; font-weight: 500;
    cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase;
    transition: all 0.18s ease;
  }
  .btn-outline:hover { border-color: var(--gold-light); color: var(--gold-light); }

  /* ── LAYOUT ── */
  .workspace {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 0;
    min-height: calc(100vh - 64px);
  }

  /* ── FORM PANEL ── */
  .form-panel {
    background: var(--paper);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 32px 28px 60px;
  }

  .section-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
  }

  .form-section { margin-bottom: 28px; }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-row.full { grid-template-columns: 1fr; }

  .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 12px;
  }
  label {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  input, textarea, select {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 9px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--ink);
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
    width: 100%;
  }
  input:focus, textarea:focus, select:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,149,42,0.12);
  }
  textarea { resize: vertical; min-height: 70px; }

  /* ── LINE ITEMS ── */
  .items-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
  .items-table th {
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 6px 8px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .items-table td { padding: 5px 4px; vertical-align: middle; }
  .items-table input { padding: 7px 8px; font-size: 0.78rem; }

  .btn-add-row {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 4px;
    color: var(--muted);
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    width: 100%;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  .btn-add-row:hover { border-color: var(--gold); color: var(--gold); }

  .btn-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 4px;
    border-radius: 3px;
    transition: color 0.15s;
    line-height: 1;
  }
  .btn-del:hover { color: var(--rust); }

  /* ── PREVIEW PANEL ── */
  .preview-panel {
    background: #e8e2d8;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 30px;
    overflow-y: auto;
  }

  .preview-label {
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .preview-label::before, .preview-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
    display: inline-block;
    width: 40px;
  }

  /* ── INVOICE PREVIEW ── */
  #invoice-preview {
    background: white;
    width: 100%;
    max-width: 680px;
    padding: 52px 56px;
    box-shadow: 0 8px 40px rgba(26,20,16,0.14), 0 2px 8px rgba(26,20,16,0.08);
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    position: relative;
    overflow: hidden;
  }

  #invoice-preview::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--gold), var(--rust), var(--gold));
  }

  .inv-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 44px;
  }
  .inv-company-name {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.1;
  }
  .inv-company-sub {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 4px;
    line-height: 1.5;
    white-space: pre-line;
  }
  .inv-title-block { text-align: right; }
  .inv-title {
    font-family: 'Fraunces', serif;
    font-size: 2.2rem;
    font-weight: 300;
    font-style: italic;
    color: var(--gold);
    line-height: 1;
  }
  .inv-meta {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.8;
    text-align: right;
  }
  .inv-meta strong { color: var(--ink); }

  .inv-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  .inv-parties {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    margin-bottom: 36px;
  }
  .inv-party-label {
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .inv-party-name {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 3px;
  }
  .inv-party-detail {
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.6;
    white-space: pre-line;
  }

  /* Items table in preview */
  .inv-items { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
  .inv-items thead tr {
    border-bottom: 2px solid var(--ink);
  }
  .inv-items th {
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 6px 8px;
    text-align: left;
    font-weight: 500;
  }
  .inv-items th:last-child, .inv-items td:last-child { text-align: right; }
  .inv-items th:nth-child(2), .inv-items td:nth-child(2) { text-align: center; }
  .inv-items th:nth-child(3), .inv-items td:nth-child(3) { text-align: right; }
  .inv-items tbody tr {
    border-bottom: 1px solid var(--cream);
    transition: background 0.1s;
  }
  .inv-items tbody tr:hover { background: #fafaf8; }
  .inv-items td {
    font-size: 0.8rem;
    padding: 10px 8px;
    color: var(--ink);
    vertical-align: top;
  }
  .inv-items td.desc { color: var(--ink); }
  .inv-items td.muted { color: var(--muted); font-size: 0.74rem; }

  .inv-totals {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 32px;
  }
  .inv-totals-box { width: 240px; }
  .inv-totals-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 0.78rem;
    color: var(--muted);
    border-bottom: 1px solid var(--cream);
  }
  .inv-totals-row.total {
    color: var(--ink);
    font-weight: 500;
    font-size: 0.92rem;
    border-bottom: none;
    border-top: 2px solid var(--ink);
    padding-top: 10px;
    margin-top: 4px;
  }
  .inv-totals-row.total span:last-child { color: var(--gold); }

  .inv-notes {
    background: var(--cream);
    border-left: 3px solid var(--gold);
    padding: 12px 16px;
    font-size: 0.74rem;
    color: var(--muted);
    border-radius: 0 4px 4px 0;
    line-height: 1.6;
  }
  .inv-notes-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 4px;
    font-weight: 500;
  }

  .inv-footer {
    text-align: center;
    margin-top: 36px;
    font-size: 0.65rem;
    color: var(--border);
    letter-spacing: 0.08em;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .workspace { grid-template-columns: 1fr; }
    .preview-panel { padding: 24px 12px; }
    #invoice-preview { padding: 32px 24px; }
  }
</style>
</head>
<body>

<header>
  <h1>Invoice <span>Generator</span></h1>
  <div class="header-actions">
    <button class="btn-outline" onclick="resetForm()">↺ Reset</button>
    <button class="btn-gold" onclick="generatePDF()">⬇ Download PDF</button>
  </div>
</header>

<div class="workspace">

  <!-- ══ FORM PANEL ══ -->
  <div class="form-panel">

    <!-- FROM -->
    <div class="form-section">
      <div class="section-title">From (Your Business)</div>
      <div class="field-row full">
        <div class="field">
          <label>Company / Your Name</label>
          <input id="from_name" type="text" placeholder="Acme Studio" oninput="renderPreview()"/>
        </div>
      </div>
      <div class="field-row full">
        <div class="field">
          <label>Address</label>
          <textarea id="from_address" placeholder="123 Main St&#10;New York, NY 10001" oninput="renderPreview()"></textarea>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Email</label>
          <input id="from_email" type="email" placeholder="hello@acme.com" oninput="renderPreview()"/>
        </div>
        <div class="field">
          <label>Phone</label>
          <input id="from_phone" type="text" placeholder="+1 555 000 0000" oninput="renderPreview()"/>
        </div>
      </div>
    </div>

    <!-- TO -->
    <div class="form-section">
      <div class="section-title">Bill To (Client)</div>
      <div class="field-row full">
        <div class="field">
          <label>Client / Company Name</label>
          <input id="to_name" type="text" placeholder="Client Corp" oninput="renderPreview()"/>
        </div>
      </div>
      <div class="field-row full">
        <div class="field">
          <label>Address</label>
          <textarea id="to_address" placeholder="456 Client Ave&#10;San Francisco, CA 94102" oninput="renderPreview()"></textarea>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Email</label>
          <input id="to_email" type="email" placeholder="billing@client.com" oninput="renderPreview()"/>
        </div>
        <div class="field">
          <label>Phone</label>
          <input id="to_phone" type="text" placeholder="+1 555 111 1111" oninput="renderPreview()"/>
        </div>
      </div>
    </div>

    <!-- INVOICE META -->
    <div class="form-section">
      <div class="section-title">Invoice Details</div>
      <div class="field-row">
        <div class="field">
          <label>Invoice Number</label>
          <input id="inv_number" type="text" placeholder="INV-0001" oninput="renderPreview()"/>
        </div>
        <div class="field">
          <label>Currency</label>
          <select id="inv_currency" onchange="renderPreview()">
            <option value="$">USD ($)</option>
            <option value="€">EUR (€)</option>
            <option value="£">GBP (£)</option>
            <option value="₹">INR (₹)</option>
            <option value="¥">JPY (¥)</option>
            <option value="A$">AUD (A$)</option>
            <option value="C$">CAD (C$)</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Issue Date</label>
          <input id="inv_date" type="date" oninput="renderPreview()"/>
        </div>
        <div class="field">
          <label>Due Date</label>
          <input id="inv_due" type="date" oninput="renderPreview()"/>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>PO Number</label>
          <input id="inv_po" type="text" placeholder="PO-2024-001" oninput="renderPreview()"/>
        </div>
         <div class="field-row">
        <div class="field">
          <label>Company Code</label>
          <input id="inv_po" type="text" placeholder="CO-2024-001" oninput="renderPreview()"/>
        </div>
        <div class="field">
          <label>Load Number</label>
          <input id="inv_load" type="text" placeholder="LOAD-5001" oninput="renderPreview()"/>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Tax Rate (%)</label>
          <input id="inv_tax" type="number" min="0" max="100" step="0.1" value="0" oninput="renderPreview()"/>
        </div>
        <div class="field">
          <label>Discount (%)</label>
          <input id="inv_discount" type="number" min="0" max="100" step="0.1" value="0" oninput="renderPreview()"/>
        </div>
      </div>
    </div>

    <!-- LINE ITEMS -->
    <div class="form-section">
      <div class="section-title">Line Items</div>
      <table class="items-table">
        <thead>
          <tr>
            <th style="width:42%">Description</th>
            <th style="width:18%">Qty</th>
            <th style="width:22%">Unit Price</th>
            <th style="width:12%">Total</th>
            <th style="width:6%"></th>
          </tr>
        </thead>
        <tbody id="items-body"></tbody>
      </table>
      <button class="btn-add-row" onclick="addRow()">+ Add Line Item</button>
    </div>

    <!-- NOTES -->
    <div class="form-section">
      <div class="section-title">Notes / Payment Terms</div>
      <div class="field-row full">
        <div class="field">
          <label>Notes</label>
          <textarea id="inv_notes" placeholder="Payment due within 30 days. Bank transfer details: ..." oninput="renderPreview()" style="min-height:90px"></textarea>
        </div>
      </div>
    </div>

  </div><!-- /form-panel -->

  <!-- ══ PREVIEW PANEL ══ -->
  <div class="preview-panel">
    <div class="preview-label">Live Preview</div>
    <div id="invoice-preview">
      <!-- rendered by JS -->
    </div>
  </div>

</div><!-- /workspace -->

<script>
// ── STATE ──────────────────────────────────────────────────────
let rows = [
  { desc: 'Design Services', qty: 1, price: 1200 },
  { desc: 'Development Work', qty: 8, price: 150 },
];

// ── INIT ───────────────────────────────────────────────────────
(function init() {
  const today = new Date();
  const due = new Date(); due.setDate(due.getDate() + 30);
  const fmt = d => d.toISOString().split('T')[0];
  document.getElementById('inv_date').value = fmt(today);
  document.getElementById('inv_due').value = fmt(due);
  document.getElementById('inv_number').value = 'INV-' + String(Math.floor(Math.random()*9000)+1000);
  renderItemsForm();
  renderPreview();
})();

// ── HELPERS ────────────────────────────────────────────────────
function v(id) { return (document.getElementById(id)||{}).value || ''; }
function fmtMoney(n, sym) { return sym + Number(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }

function calcTotals() {
  const sym = v('inv_currency') || '$';
  const tax = parseFloat(v('inv_tax')) || 0;
  const disc = parseFloat(v('inv_discount')) || 0;
  let subtotal = rows.reduce((s,r) => s + (parseFloat(r.qty)||0)*(parseFloat(r.price)||0), 0);
  const discAmt = subtotal * disc / 100;
  const taxAmt = (subtotal - discAmt) * tax / 100;
  const total = subtotal - discAmt + taxAmt;
  return { sym, subtotal, discAmt, taxAmt, total, tax, disc };
}

// ── FORM ROWS ─────────────────────────────────────────────────
function renderItemsForm() {
  const tbody = document.getElementById('items-body');
  tbody.innerHTML = '';
  rows.forEach((r, i) => {
    const line = parseFloat(r.qty||0) * parseFloat(r.price||0);
    const sym = v('inv_currency') || '$';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" value="${r.desc}" placeholder="Item description"
        onchange="rows[${i}].desc=this.value;renderPreview()" oninput="rows[${i}].desc=this.value;renderPreview()"/></td>
      <td><input type="number" value="${r.qty}" min="0" step="1"
        onchange="rows[${i}].qty=this.value;renderItemsForm();renderPreview()" style="text-align:center"/></td>
      <td><input type="number" value="${r.price}" min="0" step="0.01"
        onchange="rows[${i}].price=this.value;renderItemsForm();renderPreview()"/></td>
      <td class="muted" style="font-size:0.75rem;color:#7a7065;padding:5px 8px;white-space:nowrap">
        ${sym}${line.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
      </td>
      <td><button class="btn-del" onclick="deleteRow(${i})">×</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function addRow() {
  rows.push({ desc: '', qty: 1, price: 0 });
  renderItemsForm();
  renderPreview();
}

function deleteRow(i) {
  rows.splice(i, 1);
  renderItemsForm();
  renderPreview();
}

function resetForm() {
  if (!confirm('Reset all fields?')) return;
  rows = [{ desc: '', qty: 1, price: 0 }];
  ['from_name','from_address','from_email','from_phone',
   'to_name','to_address','to_email','to_phone','inv_notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('inv_tax').value = '0';
  document.getElementById('inv_discount').value = '0';
  renderItemsForm();
  renderPreview();
}

// ── LIVE PREVIEW ───────────────────────────────────────────────
function renderPreview() {
  const t = calcTotals();

  const itemRows = rows.map(r => {
    const line = (parseFloat(r.qty)||0)*(parseFloat(r.price)||0);
    return `
      <tr>
        <td class="desc">${r.desc || '<span style="color:#ccc">—</span>'}</td>
        <td style="text-align:center;color:#7a7065">${r.qty}</td>
        <td style="text-align:right;color:#7a7065">${fmtMoney(r.price, t.sym)}</td>
        <td style="text-align:right">${fmtMoney(line, t.sym)}</td>
      </tr>`;
  }).join('');

  const discRow = t.disc > 0 ? `
    <div class="inv-totals-row">
      <span>Discount (${t.disc}%)</span>
      <span>−${fmtMoney(t.discAmt, t.sym)}</span>
    </div>` : '';

  const taxRow = t.tax > 0 ? `
    <div class="inv-totals-row">
      <span>Tax (${t.tax}%)</span>
      <span>${fmtMoney(t.taxAmt, t.sym)}</span>
    </div>` : '';

  const notesBlock = v('inv_notes') ? `
    <div class="inv-notes">
      <div class="inv-notes-label">Notes &amp; Payment Terms</div>
      ${v('inv_notes').replace(/\n/g,'<br>')}
    </div>` : '';

  const formatDate = s => {
    if (!s) return '—';
    const [y,m,d] = s.split('-');
    return `${d}/${m}/${y}`;
  };

  document.getElementById('invoice-preview').innerHTML = `
    <div class="inv-header">
      <div>
        <div class="inv-company-name">${v('from_name') || 'Your Company'}</div>
        <div class="inv-company-sub">${(v('from_address')||'').replace(/\n/g,'<br>')}</div>
        ${v('from_email') ? `<div class="inv-company-sub">${v('from_email')}${v('from_phone') ? ' · '+v('from_phone') : ''}</div>` : ''}
      </div>
      <div class="inv-title-block">
        <div class="inv-title">Invoice</div>
        <div class="inv-meta">
          <strong>#${v('inv_number') || '—'}</strong><br>
          Issued: ${formatDate(v('inv_date'))}<br>
          Due: ${formatDate(v('inv_due'))}
          ${v('inv_po') ? `<br>PO: <strong>${v('inv_po')}</strong>` : ''}
          ${v('inv_load') ? `<br>Load: <strong>${v('inv_load')}</strong>` : ''}
        </div>
      </div>
    </div>

    <hr class="inv-divider"/>

    <div class="inv-parties">
      <div>
        <div class="inv-party-label">From</div>
        <div class="inv-party-name">${v('from_name') || '—'}</div>
        <div class="inv-party-detail">${(v('from_address')||'').replace(/\n/g,'<br>')}</div>
      </div>
      <div>
        <div class="inv-party-label">Bill To</div>
        <div class="inv-party-name">${v('to_name') || '—'}</div>
        <div class="inv-party-detail">${(v('to_address')||'').replace(/\n/g,'<br>')}</div>
        ${v('to_email') ? `<div class="inv-party-detail" style="margin-top:4px">${v('to_email')}</div>` : ''}
      </div>
    </div>

    <table class="inv-items">
      <thead>
        <tr>
          <th>Description</th>
          <th style="text-align:center">Qty</th>
          <th style="text-align:right">Unit Price</th>
          <th style="text-align:right">Amount</th>
        </tr>
      </thead>
      <tbody>${itemRows}</tbody>
    </table>

    <div class="inv-totals">
      <div class="inv-totals-box">
        <div class="inv-totals-row">
          <span>Subtotal</span>
          <span>${fmtMoney(t.subtotal, t.sym)}</span>
        </div>
        ${discRow}
        ${taxRow}
        <div class="inv-totals-row total">
          <span>Total Due</span>
          <span>${fmtMoney(t.total, t.sym)}</span>
        </div>
      </div>
    </div>

    ${notesBlock}

    <div class="inv-footer">Thank you for your business</div>
  `;
}

// ── PDF GENERATION ─────────────────────────────────────────────
async function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const t = calcTotals();
  const W = 210, H = 297;
  const ml = 20, mr = 20, mt = 20;
  let y = mt;

  // Accent bar
  doc.setFillColor(201, 149, 42);
  doc.rect(0, 0, W, 3, 'F');

  // Company name
  y = 18;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  doc.setTextColor(26, 20, 16);
  doc.text(v('from_name') || 'Your Company', ml, y);

  // Company details
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(120, 112, 101);
  const fromLines = [v('from_address'), v('from_email'), v('from_phone')].filter(Boolean).join(' | ');
  if (fromLines) doc.text(fromLines, ml, y + 6);

  // INVOICE title (right)
  doc.setFont('helvetica', 'bolditalic');
  doc.setFontSize(26);
  doc.setTextColor(201, 149, 42);
  doc.text('INVOICE', W - mr, y, { align: 'right' });

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(120, 112, 101);
  const formatDate = s => { if (!s) return '—'; const [yr,mo,d] = s.split('-'); return `${d}/${mo}/${yr}`; };
  doc.text(`# ${v('inv_number') || '—'}`, W - mr, y + 8, { align: 'right' });
  doc.text(`Issued: ${formatDate(v('inv_date'))}`, W - mr, y + 13, { align: 'right' });
  doc.text(`Due: ${formatDate(v('inv_due'))}`, W - mr, y + 18, { align: 'right' });

  // Divider
  y = 46;
  doc.setDrawColor(216, 208, 196);
  doc.setLineWidth(0.4);
  doc.line(ml, y, W - mr, y);

  // Parties
  y += 8;
  doc.setFontSize(7);
  doc.setTextColor(201, 149, 42);
  doc.setFont('helvetica', 'bold');
  doc.text('FROM', ml, y);
  doc.text('BILL TO', W / 2, y);

  y += 5;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(9);
  doc.setTextColor(26, 20, 16);
  doc.text(v('from_name') || '—', ml, y);
  doc.text(v('to_name') || '—', W / 2, y);

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(120, 112, 101);
  const fromAddr = (v('from_address')||'').split('\n');
  fromAddr.forEach((line, i) => { if (line.trim()) doc.text(line, ml, y + 5 + i * 4.5); });
  const toAddr = (v('to_address')||'').split('\n');
  toAddr.forEach((line, i) => { if (line.trim()) doc.text(line, W / 2, y + 5 + i * 4.5); });
  if (v('to_email')) doc.text(v('to_email'), W / 2, y + 5 + toAddr.length * 4.5);

  // Items table
  y = 92;
  const colDesc = ml, colQty = 110, colUnit = 145, colAmt = W - mr;
  const headerH = 7;

  doc.setFillColor(242, 237, 228);
  doc.rect(ml, y, W - ml - mr, headerH, 'F');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(7);
  doc.setTextColor(120, 112, 101);
  doc.text('DESCRIPTION', colDesc + 2, y + 4.5);
  doc.text('QTY', colQty, y + 4.5, { align: 'center' });
  doc.text('UNIT PRICE', colUnit + 10, y + 4.5, { align: 'right' });
  doc.text('AMOUNT', colAmt, y + 4.5, { align: 'right' });

  y += headerH;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8.5);
  let alt = false;
  rows.forEach(r => {
    const line = (parseFloat(r.qty)||0) * (parseFloat(r.price)||0);
    const rowH = 8;
    if (alt) {
      doc.setFillColor(250, 248, 244);
      doc.rect(ml, y, W - ml - mr, rowH, 'F');
    }
    doc.setTextColor(26, 20, 16);
    doc.text(r.desc || '—', colDesc + 2, y + 5.5);
    doc.setTextColor(120, 112, 101);
    doc.text(String(r.qty || 0), colQty, y + 5.5, { align: 'center' });
    doc.text(fmtMoney(r.price, t.sym), colUnit + 10, y + 5.5, { align: 'right' });
    doc.setTextColor(26, 20, 16);
    doc.text(fmtMoney(line, t.sym), colAmt, y + 5.5, { align: 'right' });
    y += rowH;
    alt = !alt;
  });

  // Divider
  doc.setDrawColor(26, 20, 16);
  doc.setLineWidth(0.5);
  doc.line(ml, y, W - mr, y);
  y += 6;

  // Totals
  const totX = W - mr - 60;
  doc.setFontSize(8);
  doc.setFont('helvetica', 'normal');
  const addTotRow = (label, value, isBold = false) => {
    if (isBold) {
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9.5);
      doc.setTextColor(201, 149, 42);
    } else {
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(120, 112, 101);
    }
    doc.text(label, totX, y);
    if (isBold) doc.setTextColor(201, 149, 42); else doc.setTextColor(26, 20, 16);
    doc.text(value, W - mr, y, { align: 'right' });
    y += isBold ? 7 : 6;
  };

  addTotRow('Subtotal', fmtMoney(t.subtotal, t.sym));
  if (t.disc > 0) addTotRow(`Discount (${t.disc}%)`, `−${fmtMoney(t.discAmt, t.sym)}`);
  if (t.tax > 0) addTotRow(`Tax (${t.tax}%)`, fmtMoney(t.taxAmt, t.sym));
  y += 2;
  doc.setDrawColor(26, 20, 16); doc.setLineWidth(0.4); doc.line(totX, y - 3, W - mr, y - 3);
  addTotRow('TOTAL DUE', fmtMoney(t.total, t.sym), true);

  // Notes
  if (v('inv_notes')) {
    y += 10;
    doc.setFillColor(242, 237, 228);
    doc.setFillColor(201, 149, 42);
    doc.rect(ml, y, 2, 20, 'F');
    doc.setFontSize(7);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(201, 149, 42);
    doc.text('NOTES & PAYMENT TERMS', ml + 5, y + 5);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(120, 112, 101);
    doc.setFontSize(8);
    const noteLines = doc.splitTextToSize(v('inv_notes'), W - ml - mr - 10);
    doc.text(noteLines, ml + 5, y + 10);
  }

  // Footer
  doc.setFontSize(7);
  doc.setTextColor(210, 205, 196);
  doc.text('Thank you for your business', W / 2, H - 12, { align: 'center' });
  doc.setDrawColor(216, 208, 196); doc.setLineWidth(0.3);
  doc.line(ml, H - 15, W - mr, H - 15);

  const fname = `invoice-${v('inv_number') || 'draft'}.pdf`;
  doc.save(fname);
}
</script>
</body>
</html>
